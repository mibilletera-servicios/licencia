<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto - Mundo RC Kids</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; margin: 0; background: #f0faff; }
        .nav-simple { background: #4ECDC4; padding: 1rem; text-align: left; }
        .nav-simple a { color: white; text-decoration: none; font-weight: bold; }
        
        .product-page {
            max-width: 900px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .product-image { flex: 1; min-width: 300px; }
        .product-image img { width: 100%; border-radius: 20px; }

        .product-info { flex: 1; min-width: 300px; }
        .product-info h1 { color: #FF6B6B; margin-top: 0; }
        .specs { background: #f9f9f9; padding: 1rem; border-radius: 10px; margin: 1rem 0; }
        
        .btn-buy {
            background: #FF6B6B;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="nav-simple">
    <a href="index.html">⬅ Volver a la tienda</a>
</div>

<main class="product-page">
    <div class="product-image">
        <img src="URL_DE_TU_IMAGEN_1" alt="Super Monster Truck">
    </div>
    <div class="product-info">
        <h1>Super Monster Truck</h1>
        <p class="price" style="font-size: 2rem; font-weight: bold;">$15.500</p>
        <div class="specs">
            <h4>Características para padres:</h4>
            <ul>
                <li>Batería recargable (Incluye cargador USB)</li>
                <li>Control remoto de 2.4GHz (Sin interferencias)</li>
                <li>Plástico ABS ultra resistente y no tóxico</li>
                <li>Edad recomendada: 4 a 10 años</li>
            </ul>
        </div>
        <button class="btn-buy">¡Comprar Ahora!</button>
    </div>
</main>

</body>
</html>
