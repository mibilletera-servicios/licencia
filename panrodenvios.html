<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PANROD - Seguimiento de Envíos</title>

<style>
:root{
    --azul:#1E3A8A;
    --dorado:#F59E0B;
    --gris:#F3F4F6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

.container{
    max-width:700px;
    margin:auto;
    min-height:100vh;
    background:white;
}

header{
    background:var(--azul);
    color:white;
    text-align:center;
    padding:25px 20px;
}

header h1{
    font-size:32px;
    letter-spacing:2px;
}

header p{
    color:var(--dorado);
    font-size:13px;
    margin-top:5px;
}

.content{
    padding:25px;
}

.card{
    border:1px solid #ddd;
    border-radius:12px;
    padding:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

select,
input{
    width:100%;
    height:45px;
    border:1px solid #ccc;
    border-radius:8px;
    padding:10px;
    margin-bottom:15px;
}

.input-group{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
}

.prefix,
.suffix{
    width:70px;
    height:45px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#F3F4F6;
    border:1px solid #ccc;
    border-radius:8px;
    font-weight:bold;
    color:var(--azul);
}

#numero{
    flex:1;
    text-align:center;
    font-size:18px;
    font-weight:600;
    letter-spacing:2px;
    margin-bottom:0;
}

.help-text{
    display:block;
    font-size:12px;
    color:#6B7280;
    margin-bottom:15px;
}

button{
    width:100%;
    height:48px;
    border:none;
    border-radius:25px;
    background:var(--dorado);
    font-weight:bold;
    cursor:pointer;
    font-size:15px;
    transition:.2s;
}

button:hover{
    opacity:.9;
}

.loader{
    display:none;
    text-align:center;
    margin-top:15px;
    color:var(--azul);
    font-weight:bold;
}

.resultado{
    display:none;
    margin-top:20px;
    border:1px solid #ddd;
    border-radius:10px;
    padding:18px;
    background:#fafafa;
}

.codigo{
    color:var(--azul);
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.estado{
    display:inline-block;
    color:white;
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
    margin-bottom:15px;
}

.info{
    margin:8px 0;
}

.timeline{
    margin-top:15px;
}

.timeline div{
    border-left:3px solid var(--azul);
    padding-left:10px;
    margin-bottom:10px;
    font-size:14px;
}

.error{
    display:none;
    margin-top:15px;
    background:#FEE2E2;
    color:#991B1B;
    padding:12px;
    border-radius:8px;
}

footer{
    text-align:center;
    padding:20px;
    color:#666;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<header>
    <h1>PANROD</h1>
    <p>Conectando destinos, entregando confianza</p>
</header>

<div class="content">

<div class="card">

<label>Tipo de Servicio</label>

<select>
    <option>Servicio Estándar Nacional</option>
    <option>Servicio Expreso Regional</option>
</select>

<label>Código de Seguimiento</label>

<div class="input-group">

    <div class="prefix">PR</div>

    <input
        type="text"
        id="numero"
        maxlength="9"
        placeholder="100200300">

    <div class="suffix">AR</div>

</div>

<small class="help-text">
Ingrese únicamente los 9 dígitos del envío.
Ejemplo: 100200300
</small>

<button onclick="buscarEnvio()">
    Buscar Envío
</button>

<div id="loader" class="loader">
    Consultando sistema PANROD...
</div>

<div id="error" class="error"></div>

<div id="resultado" class="resultado"></div>

</div>

</div>

<footer>
    © 2026 PANROD Logística
</footer>

</div>

<script>

const envios = [

{
codigo:"PR100200300AR",
estado:"EN DISTRIBUCIÓN",
origen:"Buenos Aires",
destino:"Córdoba Capital",
actualizacion:"03/06/2026 19:42 hs",
historial:[
"03/06/2026 08:15 hs - Recepcionado en origen",
"03/06/2026 11:42 hs - Clasificado en centro logístico",
"03/06/2026 15:20 hs - Despachado a destino",
"03/06/2026 19:42 hs - En distribución"
]
},

{
codigo:"123456789",
estado:"ENTREGADO",
origen:"Rosario",
destino:"Mar del Plata",
actualizacion:"03/06/2026 11:17 hs",
historial:[
"02/06/2026 07:50 hs - Recepcionado",
"02/06/2026 10:30 hs - Clasificado",
"02/06/2026 16:20 hs - En tránsito",
"03/06/2026 11:17 hs - Entregado"
]
}

];

document.addEventListener("DOMContentLoaded", ()=>{

const numero =
document.getElementById("numero");

numero.addEventListener("input", function(){

this.value =
this.value.replace(/[^0-9]/g,"");

});

numero.addEventListener("keypress", function(e){

if(e.key === "Enter"){
buscarEnvio();
}

});

});

function buscarEnvio(){

const numero =
document.getElementById("numero")
.value
.trim();

const codigo =
"PR" + numero + "AR";

const loader =
document.getElementById("loader");

const resultado =
document.getElementById("resultado");

const error =
document.getElementById("error");

resultado.style.display = "none";
error.style.display = "none";

if(numero.length !== 9){

error.style.display = "block";

error.innerHTML = `
<strong>CÓDIGO INVÁLIDO</strong><br>
Debe ingresar exactamente 9 dígitos numéricos.
`;

return;
}

loader.style.display = "block";

setTimeout(()=>{

loader.style.display = "none";

const envio =
envios.find(e => e.codigo === codigo);

if(!envio){

error.style.display = "block";

error.innerHTML = `
<strong>ENVÍO NO ENCONTRADO</strong><br>
No se encontraron registros asociados al código ingresado.
Verifique los datos e intente nuevamente.
`;

return;
}

let badgeColor =
envio.estado === "ENTREGADO"
? "#2563EB"
: "#10B981";

let historialHTML = "";

envio.historial.forEach(item=>{

historialHTML += `
<div>✓ ${item}</div>
`;

});

resultado.innerHTML = `

<div class="codigo">
${envio.codigo}
</div>

<span
class="estado"
style="background:${badgeColor}">
${envio.estado}
</span>

<div class="info">
<strong>Origen:</strong>
${envio.origen}
</div>

<div class="info">
<strong>Destino:</strong>
${envio.destino}
</div>

<div class="info">
<strong>Última actualización:</strong>
${envio.actualizacion}
</div>

<div class="timeline">
${historialHTML}
</div>

`;

resultado.style.display = "block";

},1000);

}

</script>

</body>
    </html>
