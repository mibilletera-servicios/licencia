<!DOCTYPE html>    
<html lang="es">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>LNC FRENTE</title>    

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>    
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>    

<style>    
body {    
    font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;    
    background: linear-gradient(135deg, #e6e6e6, #f7f7f7);  
    display:flex;    
    justify-content:center;    
    align-items:center;    
    height:100vh;    
    margin:0;    
    -webkit-font-smoothing: antialiased;  
    -moz-osx-font-smoothing: grayscale;  
    text-rendering: optimizeLegibility;  
}    

.btn-pdf{    
    position:absolute;    
    top:10px;    
    left:10px;    
    padding:8px 12px;    
    background:#4aa3df;    
    color:#fff;    
    border:none;    
    border-radius:5px;    
    cursor:pointer;    
}    

.carnet-container {  
    width:500px;  
    height:315px;  
    overflow:hidden;  
    display:flex;  
    flex-direction:column;  
    border-radius:14px;  
    border:1px solid rgba(0,0,0,0.15);  
    box-shadow:0 8px 25px rgba(0,0,0,0.18);  
    background:#fff;  
}  

.header {    
    background: rgba(255,255,255,0.2);    
    backdrop-filter: blur(6px);    
    color:#008c8c;    
    display:flex;    
    align-items:center;    
    justify-content:space-between;    
    padding:4px 10px;  
    height:38px;    
    position:relative;  
}    

.header::after{  
    content:"";  
    position:absolute;  
    bottom:0;  
    left:15px;  
    right:15px;  
    height:3px;  
    background:#00a3ff;  
}  

.header-title {    
    font-size:15px;    
    font-weight:600;    
    text-align:center;    
    flex-grow:1;    
    line-height:1.05;    
    color:#0072bb;    
    letter-spacing:1px;    
    text-transform: uppercase;  
}    

.flag-icon { width:28px; }    
.shield-icon { width:22px; }    

.content {  
    display:grid;  
    grid-template-columns:120px 1fr;  
    padding:6px;  
    gap:6px;  
    flex:1;  
    align-content:start;  
}  

.photo-placeholder {    
    width:112px;    
    height:134px;    
    background:#ffffff;    
    padding:2px;    
    border-radius:6px;    
    border:1px solid rgba(0,0,0,.25);
    cursor:pointer;    
    overflow:hidden;    
    display:flex;    
    justify-content:center;    
    align-items:center;    
    box-sizing:border-box;  
    transform: translate(8px, 10px);  
}    

.photo-placeholder img {    
    width:100%;    
    height:100%;    
    object-fit:cover;    
    display:none;    
    border-radius:3px;  
}    

.data {    
    font-size:10.5px;    
    font-weight:400;  
    color:#1a1a1a;  
    letter-spacing:0.1px;  
    line-height:1.05;  
}    

.data b{  
    font-size:12.5px;    
    font-weight:600;  
    color:#000;  
}    

.item {    
    margin-bottom:6px;    
    padding-bottom:0;    
    display:flex;  
    justify-content:flex-start;  
    gap:18px;  
    align-items:flex-start;  
}    

.label {    
    font-weight:400;  
    display:block;    
    font-size:9.5px;    
    color:#333;  
}    

.en{  
    font-weight:400;  
    color:#444;  
}  

.item-dates{  
    display:flex;  
    justify-content:flex-start;  
    gap:60px;  
    width:100%;  
    margin-top:-4px;  
}  

.footer {    
    background:#4aa3df;    
    color:#fff;    
    width:100%;    
    height:32px;    
    display:flex;    
    justify-content:space-between;    
    align-items:center;    
    padding:4px 10px;    
    font-size:9.5px;  
}    

.seguridad-vial{  
    display:flex;  
    align-items:center;  
    gap:6px;  
}  

.seguridad-vial .linea{  
    width:2px;  
    height:24px;  
    background:#fff;  
}  

.seguridad-vial .texto{  
    display:flex;  
    flex-direction:column;  
    font-weight:700;  
    font-size:12px;  
    line-height:1;  
}  

.footer-logo {    
    width:18px;    
}    

.footer-right{  
    display:flex;  
    align-items:center;  
    gap:5px;  
    transform: translateX(-15px);  
}  

.footer-country{  
    display:block;  
    font-size:12px;  
    margin-top:1px;  
    font-weight:500;  
}  

.clases{  
    margin-left:auto;  
}  

.footer-text{  
    font-size:11px;  
    line-height:1.1;  
}  

input.editar, select.editar{
    border:none;
    background:transparent;
    font:inherit;
    font-weight:600;
    color:#000;
    width:auto;
    min-width:120px;
    outline:none;
}
select.editar{
    max-width:180px;
}
</style>    
</head>    

<body>    

<button class="btn-pdf" onclick="generarPDF()">Descargar PDF</button>    
<button class="btn-pdf" style="top:45px;" onclick="generarImagen()">Descargar Imagen</button>
<button class="btn-pdf" style="top:80px;" onclick="bgInput.click()">Fondo</button>  
<input type="file" id="bgInput" hidden onchange="cambiarFondo(this)">  

<div class="carnet-container" id="carnet">    

<div class="header">    
<img src="https://upload.wikimedia.org/wikipedia/commons/1/1a/Flag_of_Argentina.svg" class="flag-icon">    
<div class="header-title">Licencia Nacional de Conducir<br>Buenos Aires</div>    
<img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Coat_of_arms_of_Argentina.svg" class="shield-icon">    
</div>    

<div class="content">    

<div class="photo-placeholder" onclick="fileInput.click()">    
<span id="txtFoto">Subir foto</span>    
<img id="preview">    
</div>    
<input type="file" id="fileInput" hidden onchange="previewImage(this)">    

<div class="data">    

<div class="item">  
<div>  
<span class="label"><b>1. N° Licencia</b></span>  
<input class="editar" value="12345678">
</div>  
<div class="clases">  
<span class="label"><b>8. Clases</b></span>  
<select class="editar" id="claseSelect">
<option value="A.1.1">A.1.1</option>
<option value="A.1.2">A.1.2</option>
<option value="A.1.3">A.1.3</option>
<option value="A.1.4">A.1.4</option>
<option value="A.2.1">A.2.1</option>
<option value="A.2.2">A.2.2</option>
<option value="B.1" selected>B.1</option>
<option value="B.2">B.2</option>
<option value="F">F</option>
<option value="G.1">G.1</option>
<option value="G.2">G.2</option>
<option value="G.3">G.3</option>
<option value="C">C</option>
<option value="D.1">D.1</option>
<option value="D.2">D.2</option>
<option value="D.3">D.3</option>
<option value="E.1">E.1</option>
<option value="E.2">E.2</option>
<option value="E.3">E.3</option>
</select>
</div>  
</div>  

<div class="item">
<div>
<span class="label"><b>2. Apellido</b></span>
<input class="editar" value="RODRÍGUEZ">
</div>
</div>

<div class="item">
<div>
<span class="label"><b>3. Nombre</b></span>
<input class="editar" value="EMILIANO NICOLÁS">
</div>
</div>

<div class="item">
<div>
<span class="label"><b>4. Domicilio</b></span>
<input class="editar" value="SARMIENTO 1234">
</div>
</div>

<div class="item">
<div>
<span class="label"><b>5. Fecha de Nac.</b></span>
<input class="editar" value="21/07/1981">
</div>

<div style="text-align:right; margin-left:auto;">
<b style="display:block;">________________</b>
<span class="label"><b>7. Firma</b></span>
</div>
</div>

<div class="item item-dates">
<div>
<span class="label"><b>6a. Otorgamiento</b></span>
<input class="editar" value="25/03/2026">
</div>

<div>
<span class="label"><b>6b. Vencimiento</b></span>
<input class="editar" value="25/03/2031">
</div>
</div>

</div>    
</div>    

<div class="footer">    
<div class="seguridad-vial">  
<div class="linea"></div>  
<div class="texto"><span>SEGURIDAD</span><span>VIAL</span></div>  
</div>  
<div class="footer-right">    
<img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Coat_of_arms_of_Argentina.svg" class="footer-logo">    
<div class="footer-text">  
<span>Ministerio de Transporte</span>  
<span class="footer-country">República Argentina</span>  
</div>  
</div>    
</div>    

</div>    

<script>    

function previewImage(input){    
const img = document.getElementById('preview');    
const txt = document.getElementById('txtFoto');    
const reader = new FileReader();    
reader.onload = e=>{    
img.src = e.target.result;    
img.style.display="block";    
txt.style.display="none";    
}    
reader.readAsDataURL(input.files[0]);    
}  

function cambiarFondo(input){  
const carnet = document.getElementById('carnet');  
const reader = new FileReader();  
reader.onload = e=>{  
carnet.style.backgroundImage = `url('${e.target.result}')`;  
carnet.style.backgroundSize = "cover";  
carnet.style.backgroundPosition = "center";  
carnet.style.backgroundRepeat = "no-repeat";  
}  
reader.readAsDataURL(input.files[0]);  
}  

async function generarPDF(){    
const { jsPDF } = window.jspdf;    
const canvas = await html2canvas(document.getElementById("carnet"), {  
scale:4,
useCORS:true,
backgroundColor:null
});    
const img = canvas.toDataURL("image/png");    
const pdf = new jsPDF({ orientation:"landscape", unit:"mm", format:[85.6,54] });    
pdf.addImage(img,"PNG",0,0,85.6,54);    
pdf.save("licencia_frente.pdf");    
}    

async function generarImagen(){
const canvas = await html2canvas(document.getElementById("carnet"), {  
scale:4,
useCORS:true,
backgroundColor:null
});
const link = document.createElement('a');
link.download = 'licencia_frente.jpg';
link.href = canvas.toDataURL("image/jpeg",1);
link.click();
}

</script>    

</body>    
    </html>
