<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- LIBRERÍAS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: #e6e6e6;
    display: flex;
    gap: 20px;
    padding: 20px;
}

/* PANEL */
.panel {
    width: 260px;
    background: white;
    padding: 12px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.panel input, .panel button {
    width: 100%;
    margin-bottom: 6px;
    padding: 6px;
    font-size: 12px;
}

/* CREDENCIAL */
.credencial {
    width: 340px;
    height: 215px;
    background: linear-gradient(135deg, #ffffff, #f8f8f8);
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    overflow: hidden;
    position: relative;
    border: 1px solid #d0d0d0;
}

/* Fondo alternativo */
.fondo-alt {
    background: linear-gradient(135deg, #dfefff, #ffffff);
}

.header {
    background: #00adef;
    height: 48px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 8px;
}

.icono-header {
    background-color: #d32f2f;
    border-radius: 50%;
    padding: 4px;
}

.subtitulo { font-size: 7px; color: white; }
.titulo { font-size: 11px; font-weight: 700; color: white; }

.marca-agua {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-25deg);
    font-size: 16px;
    opacity: 0.05;
}

.contenido { padding: 8px 10px; }
.etiqueta { font-size: 7px; color: #777; }
.valor { font-size: 10px; font-weight: 700; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.linea { height: 1px; background: #ccc; margin: 4px 6px; }

.footer {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 26px;
    background: linear-gradient(90deg, #ffffff, #00adef);
}
</style>
</head>

<body>

<div class="panel">
    <input placeholder="Nombre" oninput="setText('nombre', this.value)">
    <input placeholder="DNI" oninput="setText('dni', this.value)">
    <input placeholder="Clave" oninput="setText('clave', this.value)">
    <input placeholder="Estado" oninput="setText('estado', this.value)">
    <input placeholder="Matrícula" oninput="setText('matricula', this.value)">
    <input placeholder="Vencimiento" oninput="setText('vencimiento', this.value)">
    <input placeholder="Matriculación" oninput="setText('matriculacion', this.value)">
    <input placeholder="Profesión" oninput="setText('profesion', this.value)">
    <input placeholder="Emitido por" oninput="setText('emitido', this.value)">

    <button onclick="descargarImagen()">Descargar PNG</button>
    <button onclick="descargarPDF()">Descargar PDF</button>
    <button onclick="cambiarFondo()">Cambiar fondo</button>
</div>

<div class="credencial" id="credencial">

    <div class="header">
        <div class="icono-header">❤</div>
        <div>
            <div class="subtitulo">Red Federal...</div>
            <div class="titulo">Credencial Profesional</div>
        </div>
    </div>

    <div class="marca-agua">Ministerio de Salud</div>

    <div class="contenido">

        <div>
            <div class="etiqueta">Nombre</div>
            <div class="valor" id="nombre">JUAN PÉREZ</div>
        </div>

        <div class="grid">
            <div>
                <div class="etiqueta">DNI</div>
                <div class="valor" id="dni">XX</div>
            </div>
            <div>
                <div class="etiqueta">Clave</div>
                <div class="valor" id="clave">XXX</div>
            </div>
        </div>

        <div class="linea"></div>

        <div class="grid">
            <div>
                <div class="etiqueta">Estado</div>
                <div class="valor" id="estado">ACTIVA</div>
            </div>
            <div>
                <div class="etiqueta">Matrícula</div>
                <div class="valor" id="matricula">XXX</div>
            </div>
        </div>

        <div class="linea"></div>

        <div class="grid">
            <div>
                <div class="etiqueta">Vencimiento</div>
                <div class="valor" id="vencimiento">2025</div>
            </div>
            <div>
                <div class="etiqueta">Matriculación</div>
                <div class="valor" id="matriculacion">2020</div>
            </div>
        </div>

        <div>
            <div class="etiqueta">Profesión</div>
            <div class="valor" id="profesion">AUXILIAR</div>
        </div>

        <div>
            <div class="etiqueta">Emitido por</div>
            <div class="valor" id="emitido">Ministerio</div>
        </div>

    </div>

    <div class="footer"></div>

</div>

<script>
function setText(id, value) {
    document.getElementById(id).textContent = value;
}

/* Descargar imagen */
function descargarImagen() {
    html2canvas(document.getElementById("credencial")).then(canvas => {
        let link = document.createElement("a");
        link.download = "credencial.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}

/* Descargar PDF */
function descargarPDF() {
    html2canvas(document.getElementById("credencial")).then(canvas => {
        const { jsPDF } = window.jspdf;
        let pdf = new jsPDF('landscape', 'px', [340, 215]);
        pdf.addImage(canvas.toDataURL(), 'PNG', 0, 0, 340, 215);
        pdf.save("credencial.pdf");
    });
}

/* Cambiar fondo */
function cambiarFondo() {
    document.getElementById("credencial").classList.toggle("fondo-alt");
}
</script>

</body>
    </html>
