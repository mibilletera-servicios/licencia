<!DOCTYPE html>    
<html lang="es">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>LNC DORSO</title>    

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>    
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>    

<style>    
body {    
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e6e6e6, #f7f7f7);  
    display:flex;    
    justify-content:center;    
    align-items:center;    
    height:100vh;    
    margin:0;    
    -webkit-font-smoothing: antialiased;  
}    

.btn-pdf{    
    position:absolute;    
    top:10px;    
    left:10px;    
    padding:8px 12px;    
    background:#4aa3df;    
    color:#fff;    
    border:none;    
    border-radius:5px;    
    cursor:pointer;    
    z-index: 10;
}    

.btn-img {
    position:absolute;    
    top:10px;    
    left:135px;    
    padding:8px 12px;    
    background:#27ae60;    
    color:#fff;    
    border:none;    
    border-radius:5px;    
    cursor:pointer;    
    z-index: 10;
}

.carnet-container {  
    width:500px;  
    height:315px;  
    overflow:hidden;  
    display:flex;  
    flex-direction:column;  
    border-radius:14px;  
    border:1px solid rgba(0,0,0,0.15);  
    box-shadow:0 8px 25px rgba(0,0,0,0.18);  
    background:#fff;  
    position: relative;
    background-size: cover;
    background-position: center;
}  

.categories-box {
    margin: 10px 15px 5px 15px; 
    border: 1.5px solid #333;
    border-radius: 0px; 
    background: rgba(255, 255, 255, 0.7);
    overflow-y: auto; 
    max-height: 185px;
}

.category-row {
    display: flex;
    align-items: center;
    padding: 3px 10px; 
    border-bottom: 1.5px solid #333;
    font-size: 10px; 
    color: #1a1a1a;
}

.category-row:last-child { border-bottom: none; }

.category-icon {
    width: 35px; 
    display: flex;
    justify-content: center;
    margin-right: 12px;
    flex-shrink: 0;
    cursor: pointer; 
}

.category-icon img {
    width: 28px;
    height: 22px;
    object-fit: contain;
}

.category-text b { font-weight: 700; }

.observations-section {
    padding: 0 15px 5px 15px;
    display: flex;
    align-items: flex-end; 
    gap: 15px;
    flex-grow: 1;
    z-index: 1;
    margin-bottom: 2px; 
}

.escudo-argentino {
    width: 38px; 
    height: auto;
}

.obs-content {
    display: flex;
    flex-direction: column;
    justify-content: flex-end; 
    font-size: 10.5px;
    color: #1a1a1a;
    line-height: 1.3;
    padding-bottom: 2px;
}

.obs-row {
    display: flex;
    gap: 20px;
}

.obs-label {
    font-weight: 600;
    font-size: 9px;
    color: #333;
    text-transform: uppercase;
}

.lang-en {
    font-weight: normal !important; 
}

.footer-reverso {    
    background: transparent; 
    width:100%;    
    height:65px;    
    display:flex;    
    align-items:center;    
    padding:0 15px;    
    box-sizing: border-box;
    border-top: 2.5px solid #007bff; 
    position: relative;
}    

.lnc-text {
    font-size: 28px;
    font-weight: 900;
    color: #005a8d;
    margin-right: 10px;
    -webkit-text-stroke: 0.5px #fff;
    text-shadow: 
        2px 2px 0px #fff,
        -1px -1px 0px #fff,
        1px -1px 0px #fff,
        -1px 1px 0px #fff,
        3px 3px 5px rgba(0,0,0,0.3);
}

.barcode-wrapper {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0 15px;
}

.barcode {
    width: 100%;
    height: 32px;
    background:
      repeating-linear-gradient(
        90deg,
        #000 0px,
        #000 2px,
        #fff 2px,
        #fff 3px,
        #000 3px,
        #000 5px,
        #fff 5px,
        #fff 6px,
        #000 6px,
        #000 7px,
        #fff 7px,
        #fff 9px
      );
    image-rendering: pixelated;
    transform: translateZ(0);
}

.disclaimer-text {
    font-size: 5.8px;
    color: #005a8d;
    font-weight: bold;
    text-align: center;
    margin-top: 2px;
    text-transform: uppercase;
}

.signature-box {
    text-align: center;
    font-size: 8.5px;
    color: #000;
    min-width: 90px;
}

.sig-name {
    display: block;
    font-weight: bold;
    border-bottom: 1px solid #000;
    margin-bottom: 2px;
    text-transform: uppercase;
}

.watermark {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0.1; 
}

.linea {
    width: 4px;
    height: 60px;
    background-color: #008c8c;
}

.texto {
    display: flex;
    flex-direction: column;
    font-size: 32px;    
    font-weight: 900;
    color: #008c8c;
    line-height: 0.85;
    text-align: left;
}

.editable{
    cursor:text;
}
</style>    
</head>    

<body>    

<button class="btn-pdf" onclick="generarPDF()">Descargar PDF</button>    
<button class="btn-img" onclick="generarImagen()">Descargar Imagen</button>
<button class="btn-pdf" style="top:45px;" onclick="bgInput.click()">Fondo</button>  
<button class="btn-pdf" style="top:80px;" onclick="agregarCategoria()">+ Categoría</button>  
<button class="btn-pdf" style="top:115px;" onclick="quitarCategoria()">- Categoría</button>  
<button class="btn-pdf" style="top:150px;" onclick="toggleRecuadro()">Recuadro</button>  

<input type="file" id="bgInput" hidden onchange="cambiarFondo(this)">  
<input type="file" id="individualIconInput" hidden onchange="procesarNuevoIcono(this)">

<div class="carnet-container" id="carnet">    
    
    <div class="watermark">
        <div class="linea"></div>  
        <div class="texto">  
            <span>SEGURIDAD</span>  
            <span>VIAL</span>  
        </div>
    </div>

    <div class="categories-box" id="categoriesBox" style="z-index: 1;">
        <div class="category-row">
            <span class="category-icon" onclick="seleccionarIcono(this)">
                <img src="https://cdn-icons-png.flaticon.com/512/3198/3198336.png" class="cat-img">
            </span>
            <span class="category-text editable" contenteditable="true"><b>A1.4</b> Motocicletas de mas de 300cc. o 20 kw</span>
        </div>
    </div>

    <div class="observations-section">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Coat_of_arms_of_Argentina.svg" class="escudo-argentino">
        <div class="obs-content">
            <div class="obs-row">
                <span><span class="obs-label">Grupo y Factor:</span> <b class="editable" contenteditable="true">RH+</b></span>
                <span><span class="obs-label">CUIL:</span> <b class="editable" contenteditable="true">12-34567890-1</b></span>
            </div>
            <div class="obs-row">
                <span><span class="obs-label">Observaciones / <span class="lang-en">Observations:</span></span> <b class="editable" contenteditable="true">NINGUNA</b></span>
            </div>
        </div>
    </div>

    <div class="footer-reverso">    
        <div class="lnc-text">LNC</div>
        <div class="barcode-wrapper">
            <div class="barcode"></div>
            <div class="disclaimer-text">Los datos de la presente licencia son los obrantes en el Registro Nacional de Antecedentes de Tránsito.</div>
        </div>
        <div class="signature-box">
            <span class="sig-name">NICOLAS NAIDICH</span>
            <b>Responsable</b><br>
            <span class="lang-en" style="font-size: 7px;">responsible, in charge</span>
        </div>
    </div>    

</div>    

<script>
let iconoSeleccionadoActual = null;
let recuadroActivo = true;

function cambiarFondo(input){  
    const carnet = document.getElementById('carnet');  
    const reader = new FileReader();  
    reader.onload = e=>{  
        carnet.style.backgroundImage = `url('${e.target.result}')`;  
    }  
    reader.readAsDataURL(input.files[0]);  
}  

function seleccionarIcono(elemento) {
    iconoSeleccionadoActual = elemento.querySelector('img');
    document.getElementById('individualIconInput').click();
}

function procesarNuevoIcono(input) {
    if (input.files && input.files[0] && iconoSeleccionadoActual) {
        const reader = new FileReader();
        reader.onload = e => {
            iconoSeleccionadoActual.src = e.target.result;
        }
        reader.readAsDataURL(input.files[0]);
    }
}

function agregarCategoria(){
    const box = document.getElementById("categoriesBox");
    const fila = document.createElement("div");
    fila.className = "category-row";
    fila.innerHTML = `
        <span class="category-icon" onclick="seleccionarIcono(this)">
            <img src="https://cdn-icons-png.flaticon.com/512/741/741407.png">
        </span>
        <span class="category-text editable" contenteditable="true"><b>NUEVA</b> Editar categoría</span>
    `;
    box.appendChild(fila);
}

function quitarCategoria(){
    const box = document.getElementById("categoriesBox");
    if(box.children.length > 1){
        box.removeChild(box.lastElementChild);
    }
}

function toggleRecuadro(){
    const box = document.getElementById("categoriesBox");
    recuadroActivo = !recuadroActivo;

    if(recuadroActivo){
        box.style.border = "1.5px solid #333";
        [...box.children].forEach(el=>el.style.borderBottom="1.5px solid #333");
    }else{
        box.style.border = "none";
        [...box.children].forEach(el=>el.style.borderBottom="none");
    }
}

async function generarPDF(){    
    const { jsPDF } = window.jspdf;    
    const canvas = await html2canvas(document.getElementById("carnet"), {  
        scale:4,
        useCORS:true,
        backgroundColor:null
    });    
    const img = canvas.toDataURL("image/png");    
    const pdf = new jsPDF({ orientation:"landscape", unit:"mm", format:[85.6,54] });    
    pdf.addImage(img,"PNG",0,0,85.6,54);    
    pdf.save("licencia_dorso.pdf");    
}    

async function generarImagen(){    
    const canvas = await html2canvas(document.getElementById("carnet"), {  
        scale:6,
        useCORS:true,
        backgroundColor:null
    });    
    const link = document.createElement('a');
    link.download = 'licencia_dorso.png';
    link.href = canvas.toDataURL("image/png",1.0);
    link.click();
}
</script>    

</body>    
    </html>
