<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PANROD | Registro de Distribución</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
/* ====== ESTILOS (SIN CAMBIOS) ====== */

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Montserrat',sans-serif;
    background:#0f172a;
    color:#fff;
    min-height:100vh;
}

header{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    padding:40px 20px;
    text-align:center;
    border-bottom:1px solid #334155;
}

header h1{font-size:32px;font-weight:800;}
header p{color:#94a3b8;margin-top:10px;}

.container{max-width:900px;margin:40px auto;padding:0 20px;}

.card{
    background:#1e293b;
    border:1px solid #334155;
    border-radius:18px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.section-title{
    font-size:22px;
    font-weight:700;
    margin-bottom:20px;
    color:#38bdf8;
}

.form-group{margin-bottom:18px;}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    color:#cbd5e1;
}

input,textarea,select{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid #475569;
    background:#0f172a;
    color:#fff;
    font-size:14px;
}

textarea{resize:vertical;min-height:100px;}

input:focus,textarea:focus,select:focus{
    outline:none;border-color:#38bdf8;
}

.codigo{
    background:#020617 !important;
    color:#38bdf8 !important;
    font-weight:800;
    text-align:center;
    letter-spacing:3px;
    cursor:not-allowed;
}

.row{display:grid;grid-template-columns:1fr 1fr;gap:15px;}

.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
}

.btn-primary{background:#0284c7;color:#fff;}
.btn-primary:hover{background:#0369a1;}

.btn-success{background:#059669;color:#fff;}
.btn-success:hover{background:#047857;}

.preview{
    display:none;
    margin-top:30px;
    background:#0f172a;
    border:2px solid #0284c7;
    border-radius:15px;
    padding:25px;
}

.preview h2{color:#38bdf8;margin-bottom:20px;}

.preview-item{margin-bottom:12px;}
.preview-label{color:#94a3b8;font-size:13px;}
.preview-value{font-weight:600;}

.status-box{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    background:#1e293b;
    border-left:5px solid #f59e0b;
}

.buttons-preview{display:flex;gap:10px;margin-top:20px;}

@media(max-width:768px){
.row{grid-template-columns:1fr;}
.buttons-preview{flex-direction:column;}
}
</style>
</head>

<body>

<header>
    <h1>PANROD</h1>
    <p>Recepción · Facturación · Distribución</p>
</header>

<div class="container">
    <div class="card">

        <h2 class="section-title">📦 Formulario de Registro</h2>

        <div class="form-group">
            <label>Código de Seguimiento</label>
            <input type="text" id="codigo" class="codigo" readonly>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Nombre y Apellido</label>
                <input type="text" id="nombre">
            </div>

            <div class="form-group">
                <label>DNI</label>
                <input type="text" id="dni">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Teléfono</label>
                <input type="text" id="telefono">
            </div>

            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Provincia de Destino</label>
                <select id="provincia" onchange="actualizarCosto()">
                    <option value="">Seleccione una provincia</option>
                    <option value="Buenos Aires">Buenos Aires</option>
                    <option value="CABA">Ciudad Autónoma de Buenos Aires</option>
                    <option value="Córdoba">Córdoba</option>
                    <option value="Santa Fe">Santa Fe</option>
                    <option value="Entre Ríos">Entre Ríos</option>
                    <option value="Mendoza">Mendoza</option>
                    <option value="San Juan">San Juan</option>
                    <option value="San Luis">San Luis</option>
                    <option value="Neuquén">Neuquén</option>
                    <option value="Río Negro">Río Negro</option>
                    <option value="La Pampa">La Pampa</option>
                    <option value="Chubut">Chubut</option>
                    <option value="Santa Cruz">Santa Cruz</option>
                    <option value="Tierra del Fuego">Tierra del Fuego</option>
                </select>

                <div id="tarifaBox" class="tarifa-box" style="display:none; margin-top:15px;">
                    <div style="background:#0b1220; padding:12px; border-radius:12px; border:1px solid #334155;">
                        <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #1f2937;">
                            <span style="color:#cbd5e1;">🚚 Servicio Normal</span>
                            <strong id="precioNormal" style="color:#22c55e;">-</strong>
                        </div>
                        <div style="display:flex; justify-content:space-between; padding:10px 0;">
                            <span style="color:#cbd5e1;">⚡ Servicio Express</span>
                            <strong id="precioExpress" style="color:#f59e0b;">-</strong>
                        </div>
                        <div style="margin-top:10px; font-size:12px; color:#94a3b8;">
                            Valores estimados sujetos a peso, volumen y zona de entrega.
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Ciudad</label>
                <input type="text" id="ciudad">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Código Postal</label>
                <input type="text" id="cp">
            </div>

            <div class="form-group">
                <label>Tipo de Envío</label>
                <select id="tipoEnvio">
                    <option value="Normal">Normal</option>
                    <option value="Express">Express</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Dirección</label>
            <textarea id="direccion"></textarea>
        </div>

        <div class="form-group">
            <label>Método de Pago</label>
            <select id="metodoPago">
                <option>Transferencia</option>
                <option>Pago Fácil</option>
            </select>
        </div>

        <div class="form-group">
            <label>Observaciones</label>
            <textarea id="observaciones"></textarea>
        </div>

        <button class="btn btn-primary" onclick="generarVistaPrevia()">
            📋 Generar Solicitud
        </button>

        <div class="preview" id="preview">
            <h2>Resumen</h2>
            <div id="previewContenido"></div>

            <div class="status-box">
                ⏳ Pendiente de validación
            </div>

            <div class="buttons-preview">
                <button class="btn btn-primary" onclick="editarFormulario()">Editar</button>
                <button class="btn btn-success" onclick="enviarWhatsApp()">Enviar</button>
            </div>
        </div>

    </div>
</div>

<script>
let costoActual = {
    normal: 0,
    express: 0
};

function generarCodigoSeguimiento() {
    const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const numeros = "0123456789";

    let codigo = "PAN-";

    for (let i = 0; i < 3; i++) {
        codigo += letras.charAt(Math.floor(Math.random() * letras.length));
    }

    codigo += "-";

    for (let i = 0; i < 5; i++) {
        codigo += numeros.charAt(Math.floor(Math.random() * numeros.length));
    }

    return codigo;
}

/* ===== CODIGO SEGUIMIENTO ===== */
function generarVistaPrevia(){
    const codigo = document.getElementById("codigo").value;
    const nombre = document.getElementById("nombre").value;
    const dni = document.getElementById("dni").value;
    const telefono = document.getElementById("telefono").value;
    const email = document.getElementById("email").value;
    const provincia = document.getElementById("provincia").value;
    const ciudad = document.getElementById("ciudad").value;
    const cp = document.getElementById("cp").value;
    const direccion = document.getElementById("direccion").value;
    const tipoEnvio = document.getElementById("tipoEnvio").value;
    const metodoPago = document.getElementById("metodoPago").value;
    const observaciones = document.getElementById("observaciones").value;

    document.getElementById("previewContenido").innerHTML = `
    <div><span style="color:#94a3b8;">💰 Costo:</span> 
    <strong>
    $${(document.getElementById("tipoEnvio").value === "Express" ? costoActual.express : costoActual.normal).toLocaleString("es-AR")}
    </strong></div>
    <div style="background:#0b1220; padding:15px; border-radius:12px; border:1px solid #334155; margin-top:10px;">

        <div style="font-size:14px; color:#38bdf8; font-weight:800; margin-bottom:10px;">
            🔎 Código de Seguimiento: ${codigo}
        </div>

        <hr style="border:0; border-top:1px solid #1f2937; margin:10px 0;">

        <div style="display:grid; gap:8px; font-size:14px;">
            <div><span style="color:#94a3b8;">👤 Cliente:</span> <strong>${nombre}</strong></div>
            <div><span style="color:#94a3b8;">🪪 DNI:</span> <strong>${dni}</strong></div>
            <div><span style="color:#94a3b8;">📞 Teléfono:</span> <strong>${telefono}</strong></div>
            <div><span style="color:#94a3b8;">📧 Email:</span> <strong>${email}</strong></div>

            <div><span style="color:#94a3b8;">📍 Provincia:</span> <strong>${provincia}</strong></div>
            <div><span style="color:#94a3b8;">🏙 Ciudad:</span> <strong>${ciudad}</strong></div>
            <div><span style="color:#94a3b8;">📮 CP:</span> <strong>${cp}</strong></div>

            <div><span style="color:#94a3b8;">🏠 Dirección:</span> <strong>${direccion}</strong></div>

            <div><span style="color:#94a3b8;">🚚 Envío:</span> <strong>${tipoEnvio}</strong></div>
            <div><span style="color:#94a3b8;">💳 Pago:</span> <strong>${metodoPago}</strong></div>

            <div><span style="color:#94a3b8;">📝 Observaciones:</span> <strong>${observaciones || "Sin observaciones"}</strong></div>
        </div>
    </div>`;

    document.getElementById("preview").style.display = "block";
}

/* ===== EDITAR ===== */
function editarFormulario(){
    document.getElementById("preview").style.display="none";
}

/* ===== WHATSAPP ===== */
function enviarWhatsApp(){
    const modalidad = document.getElementById("tipoEnvio").value;
    const precioFinal = modalidad === "Express" ? costoActual.express : costoActual.normal;

    const mensaje = `📦 *NUEVA SOLICITUD LOGÍSTICA - PANROD*

━━━━━━━━━━━━━━━━━━
🔎 *Código de seguimiento:*
${document.getElementById("codigo").value}

👤 *Datos del cliente*
• Nombre: ${document.getElementById("nombre").value}
• DNI: ${document.getElementById("dni").value}
• Teléfono: ${document.getElementById("telefono").value}
• Email: ${document.getElementById("email").value}

📍 *Destino*
• Provincia: ${document.getElementById("provincia").value}
• Ciudad: ${document.getElementById("ciudad").value}
• CP: ${document.getElementById("cp").value}
• Dirección: ${document.getElementById("direccion").value}

🚚 *Envío*
• Modalidad: ${document.getElementById("tipoEnvio").value}

💰 *Costo estimado:*
$${precioFinal.toLocaleString("es-AR")}

💳 *Pago:*
${document.getElementById("metodoPago").value}

📝 *Observaciones:*
${document.getElementById("observaciones").value || "Sin observaciones"}

━━━━━━━━━━━━━━━━━━
📌 Solicito validación y despacho correspondiente.
Sistema PANROD - Logística Automatizada`;

    window.open("https://wa.me/541136514766?text=" + encodeURIComponent(mensaje), "_blank");
}

/* ===== COSTOS ===== */
function actualizarCosto(){
    const provincia = document.getElementById("provincia").value;
    const box = document.getElementById("tarifaBox");

    if(provincia === ""){
        box.style.display = "none";
        return;
    }

    const tarifas = obtenerCostoProvincia(provincia);
    costoActual = tarifas; // 🔥 guardamos global

    box.style.display = "block";
    document.getElementById("precioNormal").innerText = "$" + tarifas.normal.toLocaleString("es-AR");
    document.getElementById("precioExpress").innerText = "$" + tarifas.express.toLocaleString("es-AR");
}

/* ===== OBLIGATORIO: GLOBAL ===== */
function obtenerCostoProvincia(provincia){
    switch(provincia){
        case "Buenos Aires":
        case "CABA":
            return {normal:9500,express:15000};
        case "Santa Fe":
        case "Córdoba":
        case "Entre Ríos":
            return {normal:15000,express:21000};
        case "Mendoza":
        case "San Juan":
        case "San Luis":
            return {normal:21000,express:29000};
        case "Neuquén":
        case "Río Negro":
        case "La Pampa":
            return {normal:29000,express:35000};
        case "Chubut":
        case "Santa Cruz":
        case "Tierra del Fuego":
            return {normal:35000,express:41000};
        default:
            return {normal:9500,express:15000};
    }
}

window.onload = function () {
    document.getElementById("codigo").value = generarCodigoSeguimiento();
};
</script>

</body>
    </html>
